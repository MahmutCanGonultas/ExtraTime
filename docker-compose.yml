# Local development stack: a Postgres and the API in containers. For everyday
# work you can also just run Neon + `npm run dev`; this is for an isolated,
# offline-capable environment.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: extratime
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: '3000'
      DATABASE_URL: postgres://postgres:postgres@db:5432/extratime?sslmode=disable
      JWT_SECRET: dev-secret-at-least-16-characters
      SYNC_SECRET: dev-sync-secret
      CORS_ORIGIN: '*'
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
