# Render Blueprint — one-click, reproducible deploy of the backend.
# In Render: New → Blueprint → connect this repo. Render builds the Docker image,
# runs pending migrations then starts the server (see backend/Dockerfile CMD),
# health-checks /health, and auto-deploys on every push to the default branch.
services:
  - type: web
    name: extratime-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: frankfurt # EU — close to Neon EU + Turkey users
    plan: free # free tier sleeps after 15 min idle; upgrade to 'starter' ($7/mo) for always-on + reliable internal cron
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Secrets — set these in the Render dashboard (sync:false keeps them out of git):
      - key: DATABASE_URL # Neon connection string (use the POOLED host)
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: ADMIN_EMAILS # your account email(s), comma-separated
        sync: false
      - key: CORS_ORIGIN # your frontend origin, e.g. https://extratime.vercel.app
        sync: false
      # SYNC_SECRET must match the GitHub Actions repo secret of the same name.
      - key: SYNC_SECRET
        sync: false
      - key: API_FOOTBALL_RPM
        value: '300'
      # Strong app secret generated by Render (only the backend uses it):
      - key: JWT_SECRET
        generateValue: true
